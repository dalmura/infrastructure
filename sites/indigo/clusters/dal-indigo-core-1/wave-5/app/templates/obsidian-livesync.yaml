apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obsidian-livesync
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://apache.github.io/couchdb-helm
      chart: couchdb
      targetRevision: 4.6.3
      helm:
        valueFiles:
        - $values/sites/indigo/clusters/dal-indigo-core-1/wave-5/values/obsidian-livesync/values.yaml
    - repoURL: https://github.com/dalmura/infrastructure.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/dalmura/infrastructure.git
      path: sites/indigo/clusters/dal-indigo-core-1/wave-5/overlays/obsidian-livesync
      targetRevision: HEAD
  destination:
    namespace: obsidian-livesync
    server: {{ .Values.spec.destination.server }}
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
  revisionHistoryLimit: 0

  ignoreDifferences:
    # 1. Ignore the changing checksum annotation on the StatefulSet
    - group: apps
      kind: StatefulSet
      name: obsidian-livesync-couchdb
      jsonPointers:
        - /spec/template/metadata/annotations/checksum~1secret

    # 2. Ignore the dynamically generated data in the Secret
    - group: ""
      kind: Secret
      name: obsidian-livesync-couchdb
      jsonPointers:
        - /data/adminPassword
        - /data/cookieAuthSecret
        - /data/erlangCookie
