allowAdminParty: false
createAdminSecret: true

clusterSize: 1

# Single node configuration
couchdbConfig:
  couchdb:
    single_node: 'true'
    uuid: '6c9a7a43-62b5-47dc-ae51-f8da608faab1'
    max_document_size: '50000000'
  compactions:
    _default: [{db_fragmentation, "30%"}, {view_fragmentation, "30%"}]
  cluster:
    q: 1
    n: 1
  chttpd:
    require_valid_user_except_for_up: 'false'
    enable_cors: 'true'
    bind_address: '0.0.0.0'
    max_http_request_size: '4294967296'
  cors:
    credentials: true
    origins: '*'
    headers: 'accept, authorization, content-type, origin, referer, x-csrf-token'
    methods: 'GET, PUT, POST, HEAD, DELETE'

persistentVolume:
  enabled: true
  size: 10Gi
  storageClass: cluster-regular

autoSetup:
  enabled: true
  defaultDatabases:
    - '_users'
    - '_replicator'
    - '_global_changes'

erlangFlags:
  name: couchdb

service:
  enabled: true

networkPolicy:
  # We have a custom one in overlays
  enabled: false

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
