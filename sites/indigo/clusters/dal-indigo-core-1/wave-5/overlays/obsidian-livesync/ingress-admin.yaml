---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    app.kubernetes.io/instance: obsidian-couchdb
    app.kubernetes.io/name: obsidian-couchdb
  name: obsidian-couchdb
  annotations:
    cert-manager.io/cluster-issuer: dalmura-letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: obsidian-couchdb.indigo.dalmura.cloud
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: true
spec:
  ingressClassName: ingress-private
  tls:
    - hosts:
        - obsidian-couchdb.indigo.dalmura.cloud
      secretName: obsidian-couchdb-cert
  rules:
  - host: obsidian-couchdb.indigo.dalmura.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: couchdb-svc
            port:
              number: 5984
