apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: forgejo
  namespace: forgejo
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: gitea
      app.kubernetes.io/instance: forgejo
  ingress:
    # Allow HTTP traffic from Traefik Private
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik-private
            app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Allow SSH traffic from Traefik Private
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik-private
            app.kubernetes.io/name: traefik
      toPorts:
        - ports:
            - port: "22"
              protocol: TCP
  egress:
    # Allow DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    # Allow connections to external services
    - toFQDNs:
        - matchName: "github.com"
        - matchName: "api.github.com"
        - matchName: "codeload.github.com"
        - matchName: "www.gravatar.com"
        - matchName: "auth.indigo.dalmura.cloud"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
