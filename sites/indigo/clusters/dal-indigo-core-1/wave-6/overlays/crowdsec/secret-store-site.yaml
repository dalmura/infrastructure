apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: site
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "site"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "workload-reader-crowdsec"

          serviceAccountRef:
            name: "crowdsec"
            namespace: "crowdsec"
