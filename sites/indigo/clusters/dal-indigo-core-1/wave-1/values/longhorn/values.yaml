---
persistence:
  defaultClass: false

preUpgradeChecker:
  jobEnabled: false
  upgradeVersionCheck: false

defaultSettings:
  allowCollectingLonghornUsageMetrics: false
  backupExecutionTimeout: "5"
  concurrentReplicaRebuildPerNodeLimit: "2"
  concurrentBackupRestorePerNodeLimit: "2"
  concurrentAutomaticEngineUpgradePerNodeLimit: "1"
  replicaReplenishmentWaitInterval: "1200"
  upgradeChecker: false
  replicaAutoBalance: "best-effort"

defaultBackupStore:
  backupTarget: "s3://dal-site-backups@us-east-1/indigo/longhorn/"
  backupTargetCredentialSecret: aws-s3-credentials-secret
