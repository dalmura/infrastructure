kind: ConfigMap
apiVersion: v1
metadata:
  name: mosquitto-config
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data
    log_dest stdout
    allow_anonymous false
    per_listener_settings false

    listener 1883 0.0.0.0
    protocol mqtt

    listener 9001 0.0.0.0
    protocol websockets

    password_file /mosquitto/data/passwordfile
