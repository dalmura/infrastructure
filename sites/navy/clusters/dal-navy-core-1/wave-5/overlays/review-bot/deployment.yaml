apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: review-bot
    app.kubernetes.io/name: review-bot
  name: review-bot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: review-bot
      app.kubernetes.io/name: review-bot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: review-bot
        app.kubernetes.io/name: review-bot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: review-bot
          image: ghcr.io/anchavesb/review-bot:v0.1.4
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: review-bot-config
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: review-bot-secrets
                  key: github-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: review-bot-secrets
                  key: gemini-api-key
            - name: REVIEW_BOT_PSK
              valueFrom:
                secretKeyRef:
                  name: review-bot-secrets
                  key: review-bot-psk
          ports:
            - containerPort: 8004
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: review-bot-data
