apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: review-bot-secrets
  namespace: review-bot
spec:
  secretStoreRef:
    name: site
    kind: SecretStore

  refreshPolicy: Periodic
  refreshInterval: 1h

  data:
    - secretKey: github-token
      remoteRef:
        key: wave-5/review-bot/config
        property: github_token
    - secretKey: gemini-api-key
      remoteRef:
        key: wave-5/review-bot/config
        property: gemini_api_key
    - secretKey: review-bot-psk
      remoteRef:
        key: wave-5/review-bot/config
        property: review_bot_psk
