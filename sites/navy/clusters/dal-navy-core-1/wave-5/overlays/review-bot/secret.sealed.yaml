apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: review-bot-secrets
  namespace: review-bot
spec:
  encryptedData:
    github-token: # <Run: echo -n 'TOKEN' | kubeseal --raw --name review-bot-secrets --namespace review-bot --format yaml>
    gemini-api-key: # <Run: echo -n 'KEY' | kubeseal --raw --name review-bot-secrets --namespace review-bot --format yaml>
    review-bot-psk: # <Run: echo -n 'PSK' | kubeseal --raw --name review-bot-secrets --namespace review-bot --format yaml>
  template:
    metadata:
      name: review-bot-secrets
      namespace: review-bot
    type: Opaque
